<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <link rel="stylesheet" href="{{ url_for('static',filename='css/main.css')}}?v={{app_version}}">
  {% block head %}{% endblock %}
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div style="display:flex;align-items:baseline;gap:0.4rem">
      <span class="header-brand">BURGER<span>ALERT</span></span>
      <span class="header-version">{{app_version}}</span>
    </div>
    <nav class="nav desktop-nav">
      <a href="/" class="nav-btn {% if active_page == 'order' %}active{% endif %}">Order</a>
      <a href="/today_orders" class="nav-btn {% if active_page == 'orders' %}active{% endif %}" style="padding-right:1.5rem">
        Today's Orders
        {% if order_count %}<span class="nav-badge">{{ order_count }}</span>{% endif %}
      </a>
      <a href="/car_distribution" class="nav-btn {% if active_page == 'cars' %}active{% endif %}">Car Distribution</a>
      <button class="nav-btn nav-menu-btn" onclick="openMenuModal()" aria-label="Open menu">Menu</button>
      <button class="daynight-btn" onclick="toggleTheme()" id="theme-toggle-desktop" aria-label="Toggle theme"></button>
    </nav>
    <button class="daynight-btn" onclick="toggleTheme()" id="theme-toggle-mobile" style="display:none;font-size:0.75rem" aria-label="Toggle theme"></button>
  </header>

  <!-- Main content -->
  <main class="main">
    <div class="container">
      {% block body %}{% endblock %}
    </div>
  </main>

  <!-- Footer (desktop) -->
  <footer class="footer desktop-footer">
    <a href="https://github.com/feyruzb/burger-alert" target="_blank">Burger Alert repo</a>
  </footer>

  <!-- Mobile bottom tab bar -->
  <div class="bottom-tab-bar">
    <div class="bottom-tabs">
      <a href="/" class="tab-item {% if active_page == 'order' %}active{% endif %}">
        <span class="tab-icon">🧾</span>ORDER
      </a>
      <a href="/today_orders" class="tab-item {% if active_page == 'orders' %}active{% endif %}" style="position:relative">
        <span class="tab-icon">🍔</span>ORDERS
        {% if order_count %}<span class="tab-badge">{{ order_count }}</span>{% endif %}
      </a>
      <a href="/car_distribution" class="tab-item {% if active_page == 'cars' %}active{% endif %}">
        <span class="tab-icon">🚗</span>CARS
      </a>
      <button class="tab-menu-btn" onclick="openMenuModal()" aria-label="Open menu">
        <span class="tab-icon">📋</span>MENU
      </button>
    </div>
  </div>

  <!-- Menu modal -->
  <div class="modal-overlay hidden" id="menu-modal" onclick="closeMenuModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-head">
        <span class="modal-head-title">BIG DADDY MENU</span>
        <button class="modal-close" onclick="closeMenuModal()" aria-label="Close menu">✕</button>
      </div>
      <div class="modal-body">
        <img src="/static/images/big-daddy-menu-2.q85.jpg?v={{app_version}}" class="menu-img" alt="Big Daddy menu page 1" onclick="window.open(this.src)">
        <img src="/static/images/big-daddy-menu-1.q85.jpg?v={{app_version}}" class="menu-img" alt="Big Daddy menu page 2" onclick="window.open(this.src)">
      </div>
    </div>
  </div>
</div>

<script>
// Theme
function getDefaultTheme() {
  var stored = localStorage.getItem('ba_theme');
  if (stored === 'charcoal' || stored === 'parchment') return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'charcoal' : 'parchment';
}
function applyTheme(t) {
  document.documentElement.className = t === 'parchment' ? 'theme-parchment' : '';
  localStorage.setItem('ba_theme', t);
  var label = t === 'charcoal' ? '☀️ DAY' : '🌙 NIGHT';
  var short = t === 'charcoal' ? '☀️' : '🌙';
  document.getElementById('theme-toggle-desktop').textContent = label;
  document.getElementById('theme-toggle-mobile').textContent = short;
}
function toggleTheme() {
  var current = localStorage.getItem('ba_theme') || getDefaultTheme();
  applyTheme(current === 'charcoal' ? 'parchment' : 'charcoal');
}
applyTheme(getDefaultTheme());

// Responsive: show mobile theme button
function checkMobile() {
  var m = window.innerWidth <= 640;
  document.getElementById('theme-toggle-mobile').style.display = m ? '' : 'none';
}
checkMobile();
window.addEventListener('resize', checkMobile);

// Menu modal
function openMenuModal() { document.getElementById('menu-modal').classList.remove('hidden'); }
function closeMenuModal() { document.getElementById('menu-modal').classList.add('hidden'); }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenuModal(); });
</script>
</body>
</html>
